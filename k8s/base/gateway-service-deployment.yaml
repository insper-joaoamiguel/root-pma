apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: pma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: pma/gateway-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: SPRING_PROFILES_ACTIVE
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: CORS_ALLOWED_ORIGINS
            - name: CORS_ALLOWED_CREDENTIALS
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: CORS_ALLOWED_CREDENTIALS
            - name: AUTH_SERVICE_SOLVE_URL
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: AUTH_SERVICE_SOLVE_URL
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: pma
spec:
  selector:
    app: gateway-service
  type: LoadBalancer   # Em AWS EKS cria um ALB automaticamente
  ports:
    - port: 80
      targetPort: 8080
