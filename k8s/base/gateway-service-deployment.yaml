apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: pma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: joaoamiguel/gateway-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: SPRING_PROFILES_ACTIVE
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: CORS_ALLOWED_ORIGINS
            - name: CORS_ALLOWED_CREDENTIALS
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: CORS_ALLOWED_CREDENTIALS
            - name: AUTH_SERVICE_SOLVE_URL
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: AUTH_SERVICE_SOLVE_URL
          readinessProbe:
            httpGet:
              path: /gateway/actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /gateway/actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# LoadBalancer — o EKS provisiona um AWS Classic Load Balancer automaticamente
# O endereço público aparece em: kubectl get svc gateway-service -n pma
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: pma
  annotations:
    # Força o LB a ser externo (internet-facing)
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: gateway-service
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 8080