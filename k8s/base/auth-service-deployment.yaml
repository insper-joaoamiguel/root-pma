apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: pma/auth-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: SPRING_PROFILES_ACTIVE
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pma-secrets
                  key: JWT_SECRET_KEY
            - name: JWT_HTTP_ONLY
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: JWT_HTTP_ONLY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: pma
spec:
  selector:
    app: auth-service
  ports:
    - port: 8082
      targetPort: 8082
