apiVersion: apps/v1
kind: Deployment
metadata:
  name: exchange-service
  namespace: pma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exchange-service
  template:
    metadata:
      labels:
        app: exchange-service
    spec:
      containers:
        - name: exchange-service
          image: joaoamiguel/exchange-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: EXCHANGE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: EXCHANGE_API_BASE_URL
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: exchange-service
  namespace: pma
spec:
  selector:
    app: exchange-service
  ports:
    - port: 8081
      targetPort: 8081