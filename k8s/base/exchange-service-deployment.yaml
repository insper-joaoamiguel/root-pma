apiVersion: apps/v1
kind: Deployment
metadata:
  name: exchange-service
  namespace: pma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exchange-service
  template:
    metadata:
      labels:
        app: exchange-service
    spec:
      containers:
        - name: exchange-service
          image: pma/exchange-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: EXCHANGE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: EXCHANGE_API_BASE_URL
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: exchange-service
  namespace: pma
spec:
  selector:
    app: exchange-service
  ports:
    - port: 8081
      targetPort: 8081
