apiVersion: v1
kind: ConfigMap
metadata:
  name: pma-config
  namespace: pma
data:
  SPRING_PROFILES_ACTIVE: "docker"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  CORS_ALLOWED_CREDENTIALS: "true"
  EXCHANGE_API_BASE_URL: "https://economia.awesomeapi.com.br/json/last"
  JWT_HTTP_ONLY: "true"
  AUTH_SERVICE_SOLVE_URL: "http://auth-service:8082/auth/solve"
