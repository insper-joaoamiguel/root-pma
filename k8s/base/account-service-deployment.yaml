apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: pma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          # Substitua pelo seu usuário Docker Hub: joaoamiguel/account-service:latest
          image: joaoamiguel/account-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: MYSQL_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: pma-config
                  key: MYSQL_PORT
            - name: DATABASE_DB
              value: "account_db"
            - name: DATABASE_USERNAME
              value: "pma"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pma-secrets
                  key: MYSQL_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 90
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: pma
spec:
  selector:
    app: account-service
  ports:
    - port: 8083
      targetPort: 8083